# Store sengaja tidak dipaksa redirect ke HTTPS, supaya http://store.erlkim.web.id tetap bisa dibuka.
# HTTPS tetap disiapkan agar aman jika user membuka https://store.erlkim.web.id.
server {
    listen 80;
    listen [::]:80;
    server_name store.erlkim.web.id;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 20m;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3000;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name store.erlkim.web.id;

    ssl_certificate     /etc/ssl/cloudflare/erlkim.web.id.pem;
    ssl_certificate_key /etc/ssl/cloudflare/erlkim.web.id.key;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;
    include /etc/nginx/snippets/security-headers.conf;

    client_max_body_size 20m;

    location / {
        include /etc/nginx/snippets/proxy-common.conf;
        proxy_pass http://127.0.0.1:3000;
    }
}
